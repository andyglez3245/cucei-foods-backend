# Configuración de SonarQube para Cucei Foods Backend

# Proyecto
sonar.projectKey=cucei-foods-backend
sonar.projectName=Cucei Foods Backend
sonar.projectVersion=1.0
sonar.projectDescription=API REST para gestión de lugares y comentarios

# Directorio raíz
sonar.sources=app
sonar.tests=tests
sonar.sourceEncoding=UTF-8

# Acceso a código
sonar.host.url=http://localhost:9000

# Tests y Cobertura
sonar.python.coverage.reportPaths=coverage.xml
sonar.python.xunit.reportPath=test-results.xml

# Token de autenticación (usar variable de entorno en CI/CD)
# sonar.login=${SONAR_TOKEN}

# Rutas específicas
sonar.python.file.suffixes=.py

# Exclusiones
sonar.exclusions=**/migrations/**,**/__pycache__/**,**/venv/**,**/node_modules/**

# Tests específicos
sonar.test.inclusions=tests/**/*.py

# Cobertura
sonar.coverage.exclusions=**/tests/**,**/conftest.py,**/__init__.py
